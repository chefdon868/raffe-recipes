}, []).sort((a,b) => a.description.localeCompare(b.description));

// ─── ORDERING GUIDE ───────────────────────────────────────────────────────────
function OrderingGuide({ outletName }) {
  const outlet = OUTLET_DATA[outletName];
  const [orders, setOrders] = useState({});
  const [search, setSearch] = useState("");
  const [filterCat, setFilterCat] = useState("ALL");
  const [showOrdered, setShowOrdered] = useState(false);

  const handleQty = useCallback((code, qty) => {
    setOrders(prev => ({...prev, [code]: qty}));
  }, []);

  const categories = useMemo(() => {
    const cats = [...new Set(outlet.items.map(i => i.category).filter(Boolean))];
    return ["ALL", ...cats];
  }, [outlet]);

  const filtered = useMemo(() => outlet.items.filter(item => {
    const matchSearch = !search || item.description.toLowerCase().includes(search.toLowerCase()) || item.code.toLowerCase().includes(search.toLowerCase());
    const matchCat = filterCat === "ALL" || item.category === filterCat;
    const matchOrdered = !showOrdered || orders[item.code] > 0;
    return matchSearch && matchCat && matchOrdered;
  }), [outlet, search, filterCat, showOrdered, orders]);

  const totalValue = useMemo(() =>
    Object.entries(orders).reduce((sum, [code, qty]) => {
      const item = outlet.items.find(i => i.code === code);
      return sum + (item?.cost ? qty * item.cost : 0);
    }, 0), [orders, outlet]);

  const orderedCount = Object.values(orders).filter(v => v > 0).length;

  const handlePrint = () => {
    const ordered = outlet.items.filter(i => orders[i.code] > 0);
    if (!ordered.length) { alert("No items ordered yet."); return; }
    const today = new Date().toLocaleDateString('en-AU');
    const rows = ordered.map(i => `
      <tr>
        <td style="font-family:monospace;font-size:11px;color:#666">${i.code}</td>
        <td>${i.description}</td>
        <td style="text-align:center">${i.uom}</td>
        <td style="text-align:right;font-weight:600">${orders[i.code]}</td>
        <td style="text-align:right">$${i.cost.toFixed(2)}</td>
        <td style="text-align:right;font-weight:700">$${(i.cost * orders[i.code]).toFixed(2)}</td>
      </tr>`).join('');
    const win = window.open('','_blank');
    win.document.write(`<!DOCTYPE html><html><head><title>Order — ${outletName} — ${today}</title>
    <style>body{font-family:sans-serif;padding:20px;font-size:13px}
    h2{margin:0 0 4px}p{margin:0 0 16px;color:#666}
    table{width:100%;border-collapse:collapse}
    th{background:#1a2b4a;color:white;padding:8px;text-align:left;font-size:11px;letter-spacing:0.06em}
    td{padding:7px 8px;border-bottom:1px solid #eee}
    tfoot td{font-weight:700;border-top:2px solid #333;background:#f9f9f9}
    </style></head><body>
    <h2>Ordering Guide — ${outletName}</h2>
    <p>Plantation Island Resort · ${today}</p>
    <table><thead><tr><th>CODE</th><th>DESCRIPTION</th><th>UOM</th><th>QTY</th><th>UNIT COST</th><th>TOTAL</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td colspan="5">TOTAL ORDER VALUE</td><td style="text-align:right">$${totalValue.toFixed(2)}</td></tr></tfoot>
    </table></body></html>`);
    win.document.close();
    setTimeout(() => win.print(), 400);
  };

  const colStyle = { display:"grid", gridTemplateColumns:"88px 1fr 72px 50px 72px 80px 28px", gap:"0 8px" };

  return (
    <div style={{height:"100%", display:"flex", flexDirection:"column"}}>
      {/* Controls */}
      <div style={{padding:"12px 16px", borderBottom:"1px solid rgba(255,255,255,0.07)", background:"rgba(0,0,0,0.25)", flexShrink:0}}>
        <div style={{display:"flex", gap:8, flexWrap:"wrap", alignItems:"center"}}>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍  Search items or code…"
            style={{...S.input, flex:1, minWidth:160}} />
          <select value={filterCat} onChange={e => setFilterCat(e.target.value)} style={{...S.select, minWidth:120}}>
            {categories.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          <button onClick={() => setShowOrdered(!showOrdered)} style={{
            background: showOrdered ? outlet.accent : "rgba(255,255,255,0.1)",
            border:"none", borderRadius:5, color: showOrdered ? "#000" : "white",
            fontSize:12, padding:"7px 14px", cursor:"pointer", fontWeight:600, whiteSpace:"nowrap"
          }}>
            ✓ Ordered ({orderedCount})
          </button>
          <button onClick={handlePrint} style={{
            background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.2)",
            borderRadius:5, color:"white", fontSize:12, padding:"7px 14px", cursor:"pointer"
          }}>🖨 Print</button>
          <div style={{marginLeft:"auto", textAlign:"right"}}>
            <div style={{fontSize:10, color:"#777", letterSpacing:"0.08em"}}>ORDER TOTAL</div>
            <div style={{fontSize:22, fontWeight:800, color:outlet.accent, lineHeight:1}}>{fmt(totalValue)}</div>
          </div>
        </div>
      </div>

      {/* Header row */}
      <div style={{...colStyle, padding:"6px 16px", background:"rgba(255,255,255,0.04)", borderBottom:"1px solid rgba(255,255,255,0.08)", flexShrink:0}}>
        {["CODE","DESCRIPTION","UNIT COST","UOM","ORDER QTY","LINE TOTAL",""].map((h,i) => (
          <span key={i} style={{fontSize:10, fontWeight:700, color:"#666", letterSpacing:"0.07em",
            textAlign: i===0||i===1 ? "left" : "right"}}>{h}</span>
        ))}
      </div>

      {/* Items */}
      <div style={{flex:1, overflowY:"auto"}}>
        {filtered.length === 0 && (
          <div style={{padding:40, textAlign:"center", color:"#444"}}>No items match filters</div>
        )}
        {(() => {
          let lastCat = null;
          return filtered.map(item => {
            const showHeader = item.category && item.category !== lastCat;
            lastCat = item.category;
            const qty = orders[item.code] || 0;
            const total = qty && item.cost ? qty * item.cost : null;
            return (
              <React.Fragment key={item.code}>
                {showHeader && (
                  <div style={{...colStyle, padding:"5px 16px",
                    background:`linear-gradient(90deg, ${outlet.color}cc, transparent)`,
                    borderTop:"1px solid rgba(255,255,255,0.05)"}}>
                    <span style={{fontSize:10, fontWeight:700, letterSpacing:"0.1em",
                      color:outlet.accent, gridColumn:"1/-1"}}>
                      {item.category}
                      {item.par != null && <span style={{marginLeft:10, color:"#888", fontWeight:400}}>PAR: {item.par}</span>}
                    </span>
                  </div>
                )}
                <div style={{...colStyle, padding:"7px 16px",
                  borderBottom:"1px solid rgba(255,255,255,0.04)",
                  background: qty > 0 ? "rgba(255,255,255,0.05)" : "transparent",
                  alignItems:"center", transition:"background 0.1s"}}>
                  <span style={{fontSize:11, color:"#555", fontFamily:"'DM Mono', monospace"}}>{item.code}</span>
                  <span style={{fontSize:13, color: qty > 0 ? "#eee" : "#aaa", fontWeight: qty > 0 ? 600 : 400}}>{item.description}</span>
                  <span style={{fontSize:12, color:"#888", textAlign:"right", fontFamily:"'DM Mono', monospace"}}>
                    {item.cost ? `$${item.cost.toFixed(2)}` : "—"}
                  </span>
                  <span style={{fontSize:12, color:"#666", textAlign:"right"}}>{item.uom}</span>
                  <input type="number" min="0" step="0.5" value={qty||""} placeholder="0"
                    onChange={e => handleQty(item.code, parseFloat(e.target.value)||0)}
                    style={{...S.input, textAlign:"right", padding:"5px 8px", fontSize:13,
                      borderColor: qty > 0 ? outlet.accent+"88" : "rgba(255,255,255,0.15)"}}
                  />
                  <span style={{fontSize:13, textAlign:"right", fontWeight:700,
                    color: total ? "#4ade80" : "#333", fontFamily:"'DM Mono', monospace"}}>
                    {total ? fmt(total) : "—"}
                  </span>
                  <span></span>
                </div>
              </React.Fragment>
            );
          });
        })()}
        <div style={{height:40}} />
      </div>
    </div>
  );
}

    if (e.id !== id) return e;
    if (field === "description") {
      const match = ALL_ITEMS.find(i => i.description === value);
      if (match) return {...e, code:match.code, description:match.description, cost:match.cost, uom:match.uom};

    return {...e, [field]: value};

          const qty = parseFloat(entry.qty)||0;
          const lineTotal = entry.cost && qty ? entry.cost * qty : null;
          return (
            <div key={entry.id} style={{display:"grid", gridTemplateColumns:"1fr 76px 52px 68px 160px 1fr 32px",
              gap:"0 8px", padding:"6px 16px", borderBottom:"1px solid rgba(255,255,255,0.04)", alignItems:"center"}}>
              <div>
                <input list={`items-${entry.id}`} value={entry.description}
                  onChange={e => updateEntry(entry.id, "description", e.target.value)}
                  placeholder="Type to search item…" style={S.input} />
                <datalist id={`items-${entry.id}`}>
                  {ALL_ITEMS.map(i => <option key={i.code} value={i.description} />)}
                </datalist>
              </div>
              <span style={{fontSize:12, color: entry.cost ? "#4ade80":"#444",
                fontFamily:"'DM Mono',monospace", textAlign:"right"}}>
                {entry.cost ? `$${entry.cost.toFixed(2)}` : "—"}
              </span>
              <span style={{fontSize:12, color:"#777", textAlign:"center"}}>{entry.uom||"—"}</span>
              <input type="number" min="0" step="0.1" value={entry.qty} placeholder="0"
                onChange={e => updateEntry(entry.id, "qty", e.target.value)}
                style={{...S.input, textAlign:"right"}} />
              <select value={entry.reason} onChange={e => updateEntry(entry.id, "reason", e.target.value)}
                style={S.select}>
                {WASTAGE_REASONS.map(r => <option key={r} value={r}>{r}</option>)}
              </select>
              <div style={{display:"flex", alignItems:"center", gap:6}}>
                <input value={entry.note} onChange={e => updateEntry(entry.id, "note", e.target.value)}
                  placeholder="Note…" style={{...S.input, flex:1}} />
                {lineTotal && <span style={{fontSize:12, color:"#f87171", fontWeight:700, whiteSpace:"nowrap",
                  fontFamily:"'DM Mono',monospace"}}>{fmt(lineTotal)}</span>}
              </div>
              <button onClick={() => removeRow(entry.id)} style={{
                background:"rgba(239,68,68,0.15)", border:"1px solid rgba(239,68,68,0.25)",
                borderRadius:4, color:"#f87171", cursor:"pointer", fontSize:16,
                width:30, height:30, display:"flex", alignItems:"center", justifyContent:"center"}}>×</button>
            </div>
          );
        })}
        <div style={{padding:"10px 16px"}}>
          <button onClick={addRow} style={{
            background:"rgba(255,255,255,0.07)", border:"1px dashed rgba(255,255,255,0.2)",
            borderRadius:5, color:"#aaa", cursor:"pointer", fontSize:13, padding:"7px 20px",
            width:"100%"}}>+ Add Item</button>
        </div>
      </div>

      {/* Footer */}
      <div style={{padding:"12px 16px", borderTop:"1px solid rgba(255,255,255,0.07)",
        display:"flex", gap:10, alignItems:"center", background:"rgba(0,0,0,0.25)", flexShrink:0}}>
        <span style={{fontSize:13, color:"#666"}}>{entries.filter(e=>e.description).length} items</span>
        <div style={{flex:1}} />
        <button onClick={handlePrint} style={{
          background:"rgba(255,255,255,0.08)", border:"1px solid rgba(255,255,255,0.15)",
          borderRadius:5, color:"white", cursor:"pointer", fontSize:13, padding:"8px 18px"}}>🖨 Print</button>
        <button onClick={handleSubmit} style={{
          background:"#dc2626", border:"none", borderRadius:5, color:"white",
          cursor:"pointer", fontSize:13, padding:"8px 24px", fontWeight:700}}>Submit Wastage ›</button>
      </div>
    </div>
  );
}

// ─── APP SHELL ────────────────────────────────────────────────────────────────
const TABS = [
  ...Object.keys(OUTLET_DATA).map(name => ({id:name, label:name, icon:OUTLET_DATA[name].icon, type:"order"})),
  {id:"wastage", label:"Wastage", icon:"🗑️", type:"wastage"}
];

function App() {
  const [active, setActive] = useState("Main Kitchen");
  const outlet = OUTLET_DATA[active];

  return (
    <div style={{height:"100vh", display:"flex", flexDirection:"column", overflow:"hidden", background:"#0c0c18", color:"white"}}>

      {/* ── Top bar ── */}
      <div style={{
        background:"linear-gradient(135deg, #080d14 0%, #12082a 100%)",
        borderBottom:"1px solid rgba(255,255,255,0.07)",
        display:"flex", alignItems:"stretch", flexShrink:0,
        overflowX:"auto", minHeight:54
      }}>
        {/* Brand */}
        <div style={{display:"flex", alignItems:"center", padding:"0 20px 0 16px",
          borderRight:"1px solid rgba(255,255,255,0.07)", gap:10, flexShrink:0}}>
          <div style={{width:28, height:28, borderRadius:6, background:"linear-gradient(135deg,#d4a056,#8b5e1a)",
            display:"flex", alignItems:"center", justifyContent:"center", fontSize:15}}>👨‍🍳</div>
          <div>
            <div style={{fontSize:12, fontWeight:800, letterSpacing:"0.12em", color:"#d4a056"}}>EXECHEF</div>
            <div style={{fontSize:9, color:"#555", letterSpacing:"0.08em"}}>KITCHEN FORMS · PIR</div>
          </div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex", alignItems:"stretch", overflowX:"auto"}}>
          {TABS.map(tab => {
            const isActive = active === tab.id;
            const accentColor = tab.type === "wastage" ? "#f87171" : (OUTLET_DATA[tab.id]?.accent || "#aaa");
            return (
              <button key={tab.id} onClick={() => setActive(tab.id)} style={{
                background: isActive ? `${accentColor}14` : "transparent",
                border:"none", borderBottom: isActive ? `2px solid ${accentColor}` : "2px solid transparent",
                color: isActive ? accentColor : "#555",
                cursor:"pointer", fontSize:12, fontWeight: isActive ? 700 : 500,
                padding:"0 16px", whiteSpace:"nowrap", display:"flex", alignItems:"center",
                gap:5, transition:"all 0.15s", flexShrink:0, fontFamily:"'DM Sans', system-ui, sans-serif"
              }}>
                <span>{tab.icon}</span>{tab.label}
              </button>
            );
          })}
        </div>

        {/* Right side label */}
        <div style={{marginLeft:"auto", display:"flex", alignItems:"center",
          paddingRight:16, flexShrink:0, gap:6}}>
          <span style={{fontSize:10, color:"#444"}}>forms.exechef.com</span>
        </div>
      </div>

      {/* ── Content ── */}
      <div style={{flex:1, overflow:"hidden", display:"flex", flexDirection:"column"}}>
        {active === "wastage" ? (
          <WastageForm />
        ) : outlet ? (
          <OrderingGuide outletName={active} />
        ) : null}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
